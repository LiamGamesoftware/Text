<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Liam Chats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://drive.google.com/uc?export=download&id=1MabD2CJuF6JlVyz2fHVD-kF63qcSKo02">
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    :root {
      --cyan: #00ffff;
      --cyan-dim: rgba(0,255,255,0.12);
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #181818;
      --border: #222222;
      --text: #f0f0f0;
      --text-muted: #555555;
      --text-dim: #888888;
      --danger: #ff4c4c;
      --danger-dim: rgba(255,76,76,0.12);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    #app { height: 100%; display: flex; flex-direction: column; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .auth-screen {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.35s ease;
    }

    .auth-wordmark {
      font-size: 30px;
      font-weight: 800;
      color: var(--cyan);
      letter-spacing: -1.5px;
      margin-bottom: 6px;
    }

    .auth-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 44px;
      letter-spacing: 0.2px;
    }

    .auth-card {
      width: 100%;
      max-width: 390px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
    }

    .auth-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 9px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Manrope', sans-serif;
      cursor: pointer;
      border-radius: 6px;
      color: var(--text-muted);
      background: none;
      border: none;
      transition: all 0.2s;
    }

    .auth-tab.active { background: var(--surface2); color: var(--text); }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: 'Manrope', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--cyan); }
    .form-input::placeholder { color: var(--text-muted); }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--cyan);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Manrope', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.18s;
      letter-spacing: 0.2px;
    }

    .btn-primary:hover { opacity: 0.82; }
    .btn-primary:active { opacity: 0.65; }

    .err-box {
      background: var(--danger-dim);
      border: 1px solid rgba(255,76,76,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 16px;
      display: none;
    }

    .app-layout {
      height: 100%;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    .sidebar {
      width: 300px;
      min-width: 300px;
      height: 100%;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.25s ease;
    }

    .sidebar-head {
      padding: 18px 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-wordmark {
      font-size: 19px;
      font-weight: 800;
      color: var(--cyan);
      letter-spacing: -0.8px;
    }

    .sidebar-acts { display: flex; gap: 6px; }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.18s;
    }

    .icon-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    .search-wrap { padding: 14px 16px; }

    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 13px;
      font-family: 'Manrope', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--cyan); }
    .search-input::placeholder { color: var(--text-muted); }

    .conv-list { flex: 1; overflow-y: auto; padding: 0 8px 12px; }

    .conv-empty {
      padding: 36px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .conv-empty-title {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 1px;
      position: relative;
    }

    .conv-item:hover { background: var(--surface2); }

    .conv-item.active {
      background: var(--cyan-dim);
      border-left: 2px solid var(--cyan);
      padding-left: 8px;
    }

    .avatar {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
      color: #0a0a0a;
      font-size: 14px;
    }

    .av-md { width: 42px; height: 42px; }
    .av-lg { width: 72px; height: 72px; font-size: 28px; font-weight: 800; }

    .conv-info { flex: 1; min-width: 0; }

    .conv-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-preview {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .conv-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      flex-shrink: 0;
    }

    .conv-time { font-size: 11px; color: var(--text-muted); }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .chat-blank {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 10px;
      user-select: none;
    }

    .chat-blank-icon { font-size: 44px; opacity: 0.25; }
    .chat-blank-text { font-size: 14px; }

    .chat-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .back-chevron {
      display: none;
      color: var(--cyan);
      cursor: pointer;
      padding: 2px 4px 2px 0;
    }

    .chat-head-info { flex: 1; }
    .chat-head-name { font-size: 15px; font-weight: 700; }
    .chat-head-email { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .msg-row {
      display: flex;
      animation: msgPop 0.18s ease;
    }

    .msg-row.mine { justify-content: flex-end; }
    .msg-row.theirs { justify-content: flex-start; }

    .msg-group { display: flex; flex-direction: column; max-width: 68%; }
    .msg-row.mine .msg-group { align-items: flex-end; }
    .msg-row.theirs .msg-group { align-items: flex-start; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    .msg-row.mine .msg-bubble {
      background: var(--cyan);
      color: #0a0a0a;
      border-bottom-right-radius: 5px;
    }

    .msg-row.theirs .msg-bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 5px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 3px;
    }

    .chat-input-row {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      flex-shrink: 0;
    }

    .chat-textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: 'Manrope', sans-serif;
      color: var(--text);
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
      overflow-y: auto;
    }

    .chat-textarea:focus { border-color: var(--cyan); }
    .chat-textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 40px;
      height: 40px;
      background: var(--cyan);
      border: none;
      border-radius: 50%;
      color: #0a0a0a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.18s, transform 0.1s;
    }

    .send-btn:hover { opacity: 0.82; }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .profile-slide {
      position: absolute;
      inset: 0;
      background: var(--bg);
      z-index: 50;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.22s ease;
    }

    .slide-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
    }

    .back-link {
      background: none;
      border: none;
      color: var(--cyan);
      font-size: 14px;
      font-weight: 600;
      font-family: 'Manrope', sans-serif;
      cursor: pointer;
      padding: 0;
    }

    .slide-title { font-size: 17px; font-weight: 700; }

    .profile-body {
      flex: 1;
      overflow-y: auto;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .profile-name-lg { font-size: 24px; font-weight: 800; margin: 16px 0 4px; letter-spacing: -0.5px; }
    .profile-email-lg { font-size: 13px; color: var(--text-muted); margin-bottom: 48px; }

    .logout-btn {
      width: 100%;
      max-width: 380px;
      padding: 13px;
      background: transparent;
      border: 1px solid rgba(255,76,76,0.3);
      border-radius: 9px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 700;
      font-family: 'Manrope', sans-serif;
      cursor: pointer;
      margin-top: 28px;
      transition: background 0.18s;
    }

    .logout-btn:hover { background: var(--danger-dim); }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.18s ease;
    }

    .modal {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      animation: scaleIn 0.18s ease;
    }

    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 5px; }
    .modal-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.6; }

    .modal-foot {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-ghost {
      flex: 1;
      padding: 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.18s;
    }

    .btn-ghost:hover { border-color: var(--text-muted); }

    .btn-modal-ok {
      flex: 1.4;
      padding: 11px;
      background: var(--cyan);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Manrope', sans-serif;
      cursor: pointer;
      transition: opacity 0.18s;
    }

    .btn-modal-ok:hover { opacity: 0.82; }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.94) } to { opacity: 1; transform: scale(1) } }
    @keyframes msgPop { from { opacity: 0; transform: translateY(5px) } to { opacity: 1; transform: translateY(0) } }

    @media (max-width: 620px) {
      .sidebar { width: 100%; min-width: 100%; position: absolute; inset: 0; z-index: 10; border-right: none; }
      .sidebar.hidden { display: none; }
      .chat-area { position: absolute; inset: 0; z-index: 20; }
      .chat-area.hidden { display: none; }
      .back-chevron { display: flex; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const serverURL = "http://localhost:3000";
let socket = null;

const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)) } catch { return null } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  rm: k => localStorage.removeItem(k),
};

const KEY = { users: 'lc_users', session: 'lc_session' };

function getUsers() { return LS.get(KEY.users) || {} }
function setUsers(u) { LS.set(KEY.users, u) }
function getSession() { return LS.get(KEY.session) }
function setSession(e) { LS.set(KEY.session, e) }
function clearSession() { LS.rm(KEY.session) }

async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw + 'lc_salt_2024'));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const AVATAR_COLORS = ['#00cc99','#ff6b6b','#ffd93d','#a29bfe','#fd79a8','#74b9ff','#00cec9','#e17055','#6c5ce7','#55efc4','#fdcb6e','#81ecec','#fab1a0'];

function avatarColor(email) {
  let h = 0;
  for (let c of email) h = ((h << 5) - h + c.charCodeAt(0)) | 0;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function initials(name) {
  return (name || '?').split(/\s+/).map(w => w[0] || '').join('').toUpperCase().slice(0, 2) || '?';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtShort(ts) {
  const d = new Date(ts), now = new Date(), diff = now - d;
  if (diff < 55000) return 'now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m`;
  if (diff < 86400000) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if (diff < 604800000) return d.toLocaleDateString([],{weekday:'short'});
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function validateEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e) }

let me = null, chatWith = null, panel = null, showModal = null, authMode = 'login', searchQ = '', mobileView = 'list';
let serverData = { contacts: [], conversations: {} };

function initSocket() {
  socket = io(serverURL);
  
  socket.on("connect", () => {
    console.log("Connected to server");
    if (me) socket.emit("register_user", me.email);
  });

  socket.on("user_data_loaded", (data) => {
    serverData = data;
    updateConvList();
  });

  socket.on("receive_message", (payload) => {
    const { from, message, convKey } = payload;
    if (!serverData.conversations[convKey]) serverData.conversations[convKey] = [];
    serverData.conversations[convKey].push(message);
    if (chatWith === from || chatWith === payload.from) updateMsgArea();
    updateConvList();
  });

  socket.on("contact_added", (data) => {
    if (!serverData.contacts.includes(data.email)) {
      serverData.contacts.push(data.email);
      updateConvList();
    }
  });
}

function init() {
  const email = getSession();
  if (email) {
    const users = getUsers();
    if (users[email]) {
      me = users[email];
      initSocket();
      render();
      return;
    }
  }
  render();
}

window.addEventListener('resize', () => { if (me) render() });

async function doLogin(ev) {
  ev && ev.preventDefault();
  const email = val('i-email').toLowerCase().trim();
  const pw = val('i-pw');
  if (!email || !pw) return showErr('auth-err','Please fill in all fields.');
  const users = getUsers();
  if (!users[email]) return showErr('auth-err','No account found with that email.');
  const hash = await hashPw(pw);
  if (users[email].passwordHash !== hash) return showErr('auth-err','Incorrect password.');
  me = users[email];
  setSession(email);
  initSocket();
  render();
}

async function doRegister(ev) {
  ev && ev.preventDefault();
  const name = val('i-name').trim();
  const email = val('i-email').toLowerCase().trim();
  const pw = val('i-pw');
  if (!name || !email || !pw) return showErr('auth-err','Please fill in all fields.');
  if (!validateEmail(email)) return showErr('auth-err','Enter a valid email address.');
  if (pw.length < 6) return showErr('auth-err','Password must be at least 6 characters.');
  const users = getUsers();
  if (users[email]) return showErr('auth-err','An account already exists with that email.');
  const hash = await hashPw(pw);
  const user = { email, name, passwordHash: hash };
  users[email] = user;
  setUsers(users);
  me = user;
  setSession(email);
  initSocket();
  render();
}

function doLogout() {
  me = null; chatWith = null; panel = null; showModal = null;
  clearSession();
  if (socket) socket.disconnect();
  render();
}

async function doAddContact(ev) {
  ev && ev.preventDefault();
  const email = val('i-contact').toLowerCase().trim();
  if (!email) return;
  if (email === me.email) return showErr('add-err','You can\'t add yourself.');
  if (!validateEmail(email)) return showErr('add-err','Enter a valid email address.');
  const users = getUsers();
  if (!users[email]) return showErr('add-err','No Liam Chats account found with that email.');
  if (serverData.contacts.includes(email)) return showErr('add-err','Already in your contacts.');
  
  serverData.contacts.push(email);
  socket.emit("add_contact_mutual", { myEmail: me.email, contactEmail: email });
  socket.emit("save_contacts", { email: me.email, contacts: serverData.contacts });
  
  showModal = null;
  chatWith = email;
  mobileView = 'chat';
  render();
}

function sendMsg() {
  const ta = document.getElementById('chat-ta');
  const text = ta ? ta.value.trim() : '';
  if (!text || !chatWith) return;
  
  const convKey = [me.email, chatWith].sort().join('~~~');
  const message = { id: `${Date.now()}-${Math.random()}`, from: me.email, text, ts: Date.now(), read: false };
  
  if (!serverData.conversations[convKey]) serverData.conversations[convKey] = [];
  serverData.conversations[convKey].push(message);
  
  socket.emit("send_message", { from: me.email, to: chatWith, message });
  socket.emit("save_messages", { email1: me.email, email2: chatWith, messages: serverData.conversations[convKey] });
  
  ta.value = '';
  ta.style.height = 'auto';
  updateMsgArea();
  updateConvList();
  scrollBottom();
}

function openChat(email) {
  chatWith = email;
  mobileView = 'chat';
  showModal = null;
  panel = null;
  renderApp();
  setTimeout(scrollBottom, 60);
}

function scrollBottom() {
  const el = document.getElementById('msg-area');
  if (el) el.scrollTop = el.scrollHeight;
}

function val(id) { const el = document.getElementById(id); return el ? el.value : '' }
function showErr(id, msg) { const el = document.getElementById(id); if (el) { el.textContent = msg; el.style.display = 'block'; } }
function $(id) { return document.getElementById(id) }

function renderAuth() {
  const isReg = authMode === 'register';
  document.getElementById('app').innerHTML = `<div class="auth-screen"><div class="auth-wordmark">Liam Chats</div><div class="auth-sub">Talk to anyone, instantly.</div><div class="auth-card"><div class="auth-tabs"><button class="auth-tab ${!isReg?'active':''}" onclick="switchAuth('login')">Sign In</button><button class="auth-tab ${isReg?'active':''}" onclick="switchAuth('register')">Create Account</button></div><div class="err-box" id="auth-err"></div>${isReg ? `<div class="form-group"><label class="form-label">Display Name</label><input id="i-name" class="form-input" type="text" placeholder="Your name" autocomplete="name"></div>` : ''}<div class="form-group"><label class="form-label">Email</label><input id="i-email" class="form-input" type="email" placeholder="you@example.com" autocomplete="email"></div><div class="form-group"><label class="form-label">Password</label><input id="i-pw" class="form-input" type="password" placeholder="${isReg?'Min. 6 characters':'Your password'}" autocomplete="${isReg?'new-password':'current-password'}"></div><button class="btn-primary" id="auth-btn">${isReg?'Create Account':'Sign In'}</button></div></div>`;

  const btn = $('auth-btn');
  btn.addEventListener('click', isReg ? doRegister : doLogin);

  const onEnter = fn => e => { if (e.key === 'Enter') fn(e) };
  $('i-email')?.addEventListener('keydown', onEnter(isReg ? doRegister : doLogin));
  $('i-pw')?.addEventListener('keydown', onEnter(isReg ? doRegister : doLogin));
  $('i-name')?.addEventListener('keydown', e => { if (e.key === 'Enter') $('i-email').focus() });
}

function switchAuth(mode) { authMode = mode; render() }

function renderApp() {
  const isMobile = window.innerWidth <= 620;
  const sideHide = isMobile && mobileView === 'chat' ? 'hidden' : '';
  const chatHide = isMobile && mobileView === 'list' ? 'hidden' : '';

  const users = getUsers();
  const contacts = serverData.contacts || [];

  const convs = contacts.map(email => {
    const convKey = [me.email, email].sort().join('~~~');
    const msgs = serverData.conversations[convKey] || [];
    const last = msgs[msgs.length - 1] || null;
    return { email, name: users[email]?.name || email, last, ts: last?.ts || 0 };
  }).sort((a,b) => b.ts - a.ts);

  const filtered = searchQ ? convs.filter(c => c.name.toLowerCase().includes(searchQ.toLowerCase()) || c.email.toLowerCase().includes(searchQ.toLowerCase())) : convs;

  let convListHTML = '';
  if (filtered.length === 0) {
    convListHTML = `<div class="conv-empty"><span class="conv-empty-title">${contacts.length === 0 ? 'No contacts yet' : 'No results'}</span>${contacts.length === 0 ? 'Tap <strong>+</strong> to start a conversation.' : 'Try a different name or email.'}</div>`;
  } else {
    convListHTML = filtered.map(c => {
      const active = c.email === chatWith ? 'active' : '';
      const preview = c.last ? (c.last.from === me.email ? 'You: ' : '') + c.last.text : 'No messages yet';
      const color = avatarColor(c.email);
      return `<div class="conv-item ${active}" onclick="openChat('${esc(c.email)}')"><div class="avatar av-md" style="background:${color}">${esc(initials(c.name))}</div><div class="conv-info"><div class="conv-name">${esc(c.name)}</div><div class="conv-preview">${esc(preview.slice(0,55))}</div></div><div class="conv-meta">${c.last ? `<div class="conv-time">${fmtShort(c.last.ts)}</div>` : ''}</div></div>`;
    }).join('');
  }

  let chatHTML = '';
  if (!chatWith) {
    chatHTML = `<div class="chat-blank"><div class="chat-blank-icon">💬</div><div class="chat-blank-text">Select a conversation</div></div>`;
  } else {
    const convKey = [me.email, chatWith].sort().join('~~~');
    const msgs = serverData.conversations[convKey] || [];
    const chatName = users[chatWith]?.name || chatWith;
    const msgHTML = msgs.map((m) => {
      const ismine = m.from === me.email;
      return `<div class="msg-row ${ismine ? 'mine' : 'theirs'}"><div class="msg-group"><div class="msg-bubble">${esc(m.text)}</div><div class="msg-time">${fmtTime(m.ts)}</div></div></div>`;
    }).join('');

    chatHTML = `<div class="chat-head"><span class="back-chevron" onclick="chatWith=null; mobileView='list'; renderApp();">←</span><div class="chat-head-info"><div class="chat-head-name">${esc(chatName)}</div><div class="chat-head-email">${esc(chatWith)}</div></div></div><div class="messages-area" id="msg-area">${msgHTML}</div><div class="chat-input-row"><textarea id="chat-ta" class="chat-textarea" placeholder="Type a message..." rows="1"></textarea><button class="send-btn" onclick="sendMsg()">➤</button></div>`;
  }

  const profileHTML = !panel ? '' : `<div class="profile-slide"><div class="slide-head"><button class="back-link" onclick="panel=null; renderApp();">← Back</button><div class="slide-title">Profile</div></div><div class="profile-body"><div class="avatar av-lg" style="background:${avatarColor(me.email)}">${esc(initials(me.name))}</div><div class="profile-name-lg">${esc(me.name)}</div><div class="profile-email-lg">${esc(me.email)}</div><button class="logout-btn" onclick="doLogout()">Log Out</button></div></div>`;

  const modalHTML = !showModal ? '' : `<div class="overlay"><div class="modal"><div class="modal-title">Add Contact</div><div class="modal-desc">Enter their email to start chatting.</div><div class="err-box" id="add-err"></div><div class="form-group"><input id="i-contact" class="form-input" type="email" placeholder="friend@example.com"></div><div class="modal-foot"><button class="btn-ghost" onclick="showModal=null; renderApp();">Cancel</button><button class="btn-modal-ok" onclick="doAddContact(event)">Add</button></div></div></div>`;

  document.getElementById('app').innerHTML = `<div class="app-layout"><div class="sidebar ${sideHide}"><div class="sidebar-head"><div class="sidebar-wordmark">Liam Chats</div><div class="sidebar-acts"><button class="icon-btn" onclick="showModal='add'; renderApp();" title="Add Contact">+</button><button class="icon-btn" onclick="panel='profile'; renderApp();" title="Profile">👤</button></div></div><div class="search-wrap"><input class="search-input" type="text" placeholder="Search..." id="search-input"></div><div class="conv-list">${convListHTML}</div></div><div class="chat-area ${chatHide}">${chatHTML}</div>${profileHTML}${modalHTML}</div>`;

  const searchInput = $('search-input');
  if (searchInput) searchInput.addEventListener('input', e => { searchQ = e.target.value; renderApp(); });
}

function updateMsgArea() { if (chatWith && me) renderApp(); }
function updateConvList() { if (me) renderApp(); }

function render() {
  if (!me) {
    renderAuth();
  } else {
    if (!socket || !socket.connected) initSocket();
    if (socket && socket.connected) socket.emit("load_user_data", me.email);
    renderApp();
  }
}

init();
</script>
</body>
</html>
